<style>
:root{
  --bg:#FAFAF7;--surface:#FFFFFF;--ink:#0F172A;--deep:#1F2937;
  --text:#4D4D4D;--muted:#737373;--light:#9CA3AF;
  --line-warm:#D8D2C7;--line:rgba(15,23,42,.08);
  --blue:#1E40AF;--zhu:#8B1A1A;--gold:#9C7A26;
  --sidebar-w:210px;
  --sans:Inter,"Noto Sans SC","Microsoft YaHei","PingFang SC",system-ui,sans-serif;
  --serif:Fraunces,"Noto Serif SC","Source Han Serif SC","Songti SC",Georgia,serif;
  --mono:"JetBrains Mono","SF Mono",Consolas,Monaco,monospace;
}
*{box-sizing:border-box}html{background:var(--bg);scroll-behavior:smooth}
body{margin:0;color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}

/* Top bar */
.top{position:sticky;top:0;z-index:100;background:rgba(250,250,247,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--line-warm)}
.top-inner{height:56px;display:flex;align-items:center;padding:0 24px;max-width:1400px;margin:0 auto;gap:24px}
.top-brand{display:flex;align-items:baseline;gap:8px;min-width:max-content}
.top-brand strong{font-family:var(--serif);font-size:20px;font-weight:600}
.top-brand span{font-family:var(--mono);font-size:10px;letter-spacing:.12em;color:var(--muted);text-transform:uppercase}
.top-nav{display:flex;gap:16px;color:var(--muted);font-family:var(--mono);font-size:11px;letter-spacing:.04em}
.top-nav a:hover{color:var(--ink)}.top-nav .on{color:var(--ink)}

/* Layout */
.layout{display:flex;max-width:1400px;margin:0 auto;min-height:calc(100vh - 56px)}

/* Sidebar */
.sidebar{
  width:var(--sidebar-w);flex-shrink:0;
  position:sticky;top:56px;height:calc(100vh - 56px);
  overflow-y:auto;padding:32px 0 24px;
  border-right:1px solid var(--line-warm);
  background:rgba(250,250,247,.6);
}
.sidebar-title{font-family:var(--mono);font-size:10px;letter-spacing:.1em;color:var(--light);text-transform:uppercase;padding:0 24px;margin-bottom:14px}
.sb-link{
  display:block;padding:6px 24px;
  font-size:13.5px;color:var(--muted);line-height:1.6;
  border-left:2px solid transparent;transition:all .12s;
}
.sb-link:hover{color:var(--ink);background:rgba(216,210,199,.2)}
.sb-link.active{color:var(--ink);font-weight:500;border-left-color:var(--zhu);background:rgba(139,26,26,.04)}

/* Main content */
.main{flex:1;min-width:0;padding:32px 40px 80px;background-color:var(--bg);
  background-image:url("data:image/svg+xml,%3Csvg width='160' height='160' viewBox='0 0 160 160' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' stroke='%23D8D2C7' stroke-opacity='.34'%3E%3Cpath d='M0 40H160M0 120H160M40 0V160M120 0V160'/%3E%3C/g%3E%3Cg fill='%23B9B1A5' fill-opacity='.18'%3E%3Ccircle cx='18' cy='26' r='.8'/%3E%3Ccircle cx='87' cy='54' r='.7'/%3E%3Ccircle cx='132' cy='96' r='.75'/%3E%3Ccircle cx='48' cy='142' r='.65'/%3E%3C/g%3E%3C/svg%3E");
  background-attachment:fixed;
}

/* Hero in main */
.hero{margin-bottom:44px}
.hero-eyebrow{font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;color:var(--zhu);text-transform:uppercase;margin-bottom:10px}
.hero h1{font-family:var(--serif);font-size:clamp(26px,3.5vw,38px);font-weight:600;line-height:1.18;margin:0 0 8px}
.hero p{font-size:14.5px;color:var(--text);max-width:600px;line-height:1.65;margin:0}

/* Category section */
.cat-section{margin-bottom:48px;scroll-margin-top:72px}
.cat-head{display:flex;align-items:baseline;gap:10px;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--line-warm)}
.cat-index{font-family:var(--mono);font-size:10.5px;color:var(--light);letter-spacing:.06em}
.cat-head h2{font-family:var(--serif);font-size:20px;font-weight:600;margin:0}
.cat-desc{font-size:13px;color:var(--muted);margin-left:auto}

/* Sub tabs (brand section) */
.sub-tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.stab{
  font-family:var(--mono);font-size:10.5px;color:var(--muted);
  background:var(--surface);border:1px solid var(--line-warm);
  border-radius:4px;padding:5px 12px;cursor:pointer;transition:all .12s;
}
.stab:hover{color:var(--ink);border-color:var(--light)}
.stab.on{color:var(--ink);background:var(--deep);border-color:var(--deep);color:#fff}

/* Card grid */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:10px}
.card{
  display:grid;
  grid-template-columns:20px 1fr;
  grid-template-rows:auto 1fr auto;
  gap:3px 10px;
  background:var(--surface);border:1px solid var(--line);
  border-radius:5px;padding:12px 14px;
  transition:border-color .12s,box-shadow .12s;
}
.card:hover{border-color:var(--line-warm);box-shadow:0 2px 8px rgba(15,23,42,.05)}
.card-icon{grid-row:1/3;display:flex;align-items:flex-start;padding-top:2px}
.card-icon img{width:16px;height:16px;border-radius:2px;display:block}
.card-name{font-size:13px;font-weight:600;color:var(--ink)}
.card-desc{font-size:12px;color:var(--muted);line-height:1.5}
.card-domain{font-family:var(--mono);font-size:10px;color:var(--light);grid-column:2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* Footer simplified */
footer{margin-top:80px;padding:24px 40px;color:var(--muted);font-size:12.5px;border-top:1px solid var(--line-warm)}
footer a{color:var(--blue)}

/* Responsive */
@media(max-width:900px){
  .layout{flex-direction:column}
  .sidebar{
    position:static;width:100%;height:auto;
    border-right:none;border-bottom:1px solid var(--line-warm);
    padding:16px 24px;display:flex;flex-wrap:wrap;gap:6px;
    overflow-x:auto;
  }
  .sidebar-title{display:none}
  .sb-link{padding:4px 10px;font-size:12px;border-left:none;border-radius:4px;border:1px solid var(--line-warm)}
  .sb-link.active{border-left-color:var(--line-warm);background:var(--deep);color:#fff}
  .main{padding:24px 20px 60px}
  .card-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<header class="top">
  <div class="top-inner">
    <a href="/" class="top-brand"><strong>Sequentry</strong><span>序引效能</span></a>
    <nav class="top-nav">
      <a href="/">首页</a><a href="/about/">关于</a>
      <a href="/briefs/">信号</a><a href="/report/">报告</a>
      <a href="/sources/">信源</a>
      <a href="/nav/" class="on">导航</a>
    </nav>
  </div>
</header>

<div class="layout">

<aside class="sidebar" id="sidebar">
  <div class="sidebar-title">Categories</div>
  {{SIDEBAR}}
</aside>

<main class="main">
  <section class="hero">
    <div class="hero-eyebrow">Research Navigator</div>
    <h1>品牌研究导航</h1>
    <p>收录 {{TOTAL}} 个精选信源，覆盖平台政策、合规法规、供应链、市场需求、行业媒体、品牌视觉等 11 个品类。左侧按品类导航，品牌视觉区支持子分类切换。</p>
  </section>

{{SECTIONS}}
</main>

</div>

<footer>
  <p>序引效能 · Sequentry — <a href="https://www.sequentry.com">sequentry.com</a></p>
</footer>

<script>
// Sidebar active tracking
const sbLinks = document.querySelectorAll('.sb-link');
const sections = document.querySelectorAll('.cat-section');

function updateActive() {
  let current = '';
  sections.forEach(sec => {
    const rect = sec.getBoundingClientRect();
    if (rect.top <= 120) current = sec.id;
  });
  sbLinks.forEach(link => {
    link.classList.toggle('active', link.getAttribute('href') === '#' + current);
  });
}
window.addEventListener('scroll', updateActive, {passive: true});

// Sub-tab switching for brand section
document.querySelectorAll('.sub-tabs').forEach(tabBar => {
  const pane = tabBar.parentElement;
  tabBar.addEventListener('click', e => {
    const btn = e.target.closest('.stab');
    if (!btn) return;
    const sub = btn.dataset.sub;
    tabBar.querySelectorAll('.stab').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
    pane.querySelectorAll('.sub-pane').forEach(p => {
      p.style.display = p.dataset.sub === sub ? '' : 'none';
    });
  });
});
</script>
</body>
</html>
